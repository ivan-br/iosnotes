name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          cat Podfile.properties.json
          pod install

      - name: Detect workspace and scheme
        id: detect
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -n 1)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT

          PROJECT=$(find ios -maxdepth 1 -name "*.xcodeproj" | head -n 1)
          SCHEME=$(basename "$PROJECT" .xcodeproj)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          xcodebuild -list -workspace "$WORKSPACE"

      - name: Archive unsigned iOS app
        run: |
          rm -rf build
          xcodebuild \
            -workspace "${{ steps.detect.outputs.workspace }}" \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/MyNotes.xcarchive \
            SKIP_INSTALL=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package IPA
        run: |
          APP_PATH=$(find build/MyNotes.xcarchive/Products/Applications -maxdepth 1 -type d -name "*.app" | head -n 1)

          echo "App path: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in archive. Available archive products:"
            find build -maxdepth 8 -print
            exit 1
          fi

          rm -rf Payload MyNotes.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          BUNDLED_APP="Payload/$(basename "$APP_PATH")"

          echo "Packaged app contents:"
          find Payload -maxdepth 3 -print

          test -f "$BUNDLED_APP/main.jsbundle"
          test -f "$BUNDLED_APP/Assets.car"

          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$BUNDLED_APP/Info.plist")
          echo "Executable: $EXECUTABLE"
          test -x "$BUNDLED_APP/$EXECUTABLE"

          echo "Bundle identifier:"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$BUNDLED_APP/Info.plist"

          echo "Registered URL types:"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleURLTypes' "$BUNDLED_APP/Info.plist" || true

          echo "RCTNewArchEnabled:"
          /usr/libexec/PlistBuddy -c 'Print :RCTNewArchEnabled' "$BUNDLED_APP/Info.plist" || true

          echo "main.jsbundle format:"
          file "$BUNDLED_APP/main.jsbundle"

          /usr/bin/zip -qry MyNotes.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyNotes-unsigned-ipa
          path: MyNotes.ipa
