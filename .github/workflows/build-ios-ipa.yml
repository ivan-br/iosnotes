name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Prebuild iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Detect workspace and scheme
        id: detect
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -n 1)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT

          SCHEME=$(xcodebuild -list -json -workspace "$WORKSPACE" | ruby -rjson -e 'puts JSON.parse(STDIN.read)["workspace"]["schemes"][0]')
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"

      - name: Build unsigned iOS app
        run: |
          xcodebuild \
            -workspace "${{ steps.detect.outputs.workspace }}" \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)

          echo "App path: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          zip -r MyNotes.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyNotes-unsigned-ipa
          path: MyNotes.ipa
